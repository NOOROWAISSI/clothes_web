<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEMOISELLE - قائمة المفضلة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        :root{
            --black:#000000;--gray1:#1e1e1e;--gray2:#2a2a2a;--gray3:#3d3d3d;
            --gray4:#555555;--gray5:#777777;--gray6:#999999;--gray7:#bbbbbb;
            --light:#f0f0f0;--lighter:#f8f8f8;--white:#ffffff;--red:#ca192c;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Tajawal',sans-serif;background:var(--white);color:var(--black);transition:all .3s;}

        .lang-switcher{background:var(--black);display:flex;align-items:center;justify-content:flex-end;gap:4px;padding:5px 60px;font-size:11px;}
        .lang-btn{padding:4px 12px;border:1px solid transparent;border-radius:2px;cursor:pointer;font-weight:700;color:var(--gray5);transition:all .2s;background:none;}
        .lang-btn:hover{color:var(--white);}
        .lang-btn.active{background:linear-gradient(135deg,var(--gray2),var(--gray1));color:var(--white);}
        .lang-sep{color:var(--gray4);}

        .offer-bar{background:var(--black);color:var(--gray7);text-align:center;padding:9px 20px;font-size:12px;font-weight:500;letter-spacing:.5px;border-bottom:1px solid var(--gray2);}

        .header{background:var(--white);border-bottom:1px solid var(--gray6);padding:0 30px;height:68px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
        .header-logo{position:absolute;left:50%;transform:translateX(-50%);}
        .header-logo img{height:52px;width:auto;}
        .header-right,.header-left{display:flex;align-items:center;gap:10px;}
        .hamburger-btn{display:flex;flex-direction:column;justify-content:center;gap:5px;width:40px;height:40px;background:none;border:none;cursor:pointer;padding:8px 6px;}
        .hamburger-btn span{display:block;height:2px;background:var(--black);border-radius:2px;transition:all .3s;}
        .h-btn{display:flex;align-items:center;gap:6px;padding:7px 13px;border:1.5px solid var(--gray5);border-radius:4px;font-size:12.5px;font-weight:600;color:var(--gray4);cursor:pointer;transition:all .2s;background:var(--white);}
        .h-btn:hover{background:var(--lighter);border-color:var(--gray3);color:var(--black);}
        .cart-badge{background:var(--black);color:var(--white);font-size:10px;font-weight:700;padding:2px 6px;border-radius:50%;}

        /* Nav Drawer */
        .nav-drawer-overlay {position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; opacity: 0; visibility: hidden; transition: all 0.3s;}
        .nav-drawer-overlay.open {opacity: 1; visibility: visible;}
        .nav-drawer {position: fixed; top: 0; right: -320px; width: 320px; height: 100%; background: white; z-index: 1000; box-shadow: -5px 0 20px rgba(0,0,0,0.2); transition: right 0.4s ease;}
        .nav-drawer.open {right: 0;}
        .nav-drawer-header {display: flex; align-items: center; justify-content: space-between; padding: 20px 25px; border-bottom: 1px solid #eee;}
        .nav-drawer-logo img {height: 45px; width: auto;}
        .nav-drawer-close {background: none; border: none; font-size: 28px; color: #000; cursor: pointer; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;}

        .nav-drawer-links {display: flex; flex-direction: column; padding: 10px 0;}
        .nav-drawer-links a {padding: 16px 25px; font-size: 17px; color: var(--black); text-decoration: none; border-bottom: 1px solid #eee;}
        .nav-drawer-links a:hover {background: #f8f8f8; color: var(--red);}

        .wishlist-top {padding:30px 60px 20px; background:var(--white); border-bottom:1px solid var(--gray6);}
        .wishlist-top-header {display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:15px; margin-bottom:20px;}
        .wishlist-title {font-size:28px; font-weight:500;}

        .top-actions {display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; width: 100%;}
        .filter-sort {display:flex; gap:15px; font-size:14px; color:var(--gray5); align-items:center;}
        .filter-sort select {border:1px solid #ddd; padding:7px 12px; border-radius:4px; background:white;}

        .social-icons {display: flex; gap: 12px; align-items: center;}
        .social-icons a {
            width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
            background: var(--white); border: 1.5px solid var(--gray5); border-radius: 50%;
            color: var(--gray5); font-size: 18px; transition: all 0.3s; text-decoration: none;
        }
        .social-icons a:hover {
            background: var(--black); color: white; border-color: var(--black); transform: translateY(-3px);
        }

        .toolbar{display:flex;align-items:center;justify-content:space-between;padding:16px 60px;border-bottom:1px solid var(--gray6);background:var(--white);}
        .products-main{padding:28px 60px;}
        .products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:26px;}

        .product-card{
            background:var(--white);
            border-radius:8px;
            overflow:hidden;
            box-shadow:0 4px 15px rgba(0,0,0,0.08);
            cursor:pointer;
            transition:all .3s;
        }
        .product-card:hover{transform:translateY(-8px);box-shadow:0 18px 38px rgba(0,0,0,0.14);}

        .product-img-wrap{position:relative;aspect-ratio:3/4;overflow:hidden;background:var(--lighter);border:7px solid var(--black);}

        /* اللوجو الجديد - أكبر وبدون إطار */
        .logo-badge{
            position:absolute;
            top:12px;
            right:12px;
            width:58px;
            height:58px;
            z-index:6;
            padding:4px;
            /* بدون خلفية سوداء */
            background: transparent;
        }
        .logo-badge img{
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.25)); /* ظل خفيف للوضوح */
        }

        .wishlist-btn{position:absolute;top:12px;left:12px;z-index:7;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.92);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--gray5);transition:all .25s;box-shadow:0 2px 8px rgba(0,0,0,0.15);}
        .wishlist-btn:hover{transform:scale(1.12);color:var(--red);}
        .wishlist-btn.active{color:var(--red);}

        .swatches-row{display:flex;justify-content:center;gap:7px;padding:10px 0 4px;}
        .swatch-circle{width:24px;height:24px;border-radius:50%;border:2px solid #ddd;cursor:pointer;transition:all .2s;}
        .swatch-circle:hover{border-color:var(--black);transform:scale(1.15);}

        .product-info{padding:14px 16px;text-align:center;}
        .product-name{font-size:15px;font-weight:500;margin-bottom:8px;}
        .price-sale{font-size:17px;font-weight:700;color:var(--red);}
        .price-old{font-size:13px;color:var(--gray5);text-decoration:line-through;margin-top:2px;}

        .product-options {padding: 0 16px 16px; display: flex; flex-direction: column; gap: 12px;}
        .option-row {display: flex; gap: 10px;}
        .option-row select {flex: 1; padding: 9px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px;}
        .add-to-cart-btn {background: var(--black); color: white; border: none; padding: 12px; border-radius: 4px; font-weight: 600; cursor: pointer;}
        .add-to-cart-btn:hover { background: var(--red); }

        .empty-state{text-align:center;padding:70px 20px;color:var(--gray5);grid-column:1/-1;}
        .empty-state .icon{font-size:48px;margin-bottom:16px;opacity:.4;}

        @media(max-width:768px){
            .header,.wishlist-top,.toolbar,.products-main{padding-right:16px;padding-left:16px;}
            .wishlist-title{font-size:24px;}
            .nav-drawer {width: 280px; right: -280px;}
            .top-actions {flex-direction: column; align-items: flex-start; gap: 15px;}
            .social-icons {margin-top: 5px;}
        }
    </style>
</head>
<body>

<div class="lang-switcher">
    <button class="lang-btn active" data-lang="ar" onclick="setLang('ar')">العربية</button>
    <span class="lang-sep">|</span>
    <button class="lang-btn" data-lang="en" onclick="setLang('en')">English</button>
    <span class="lang-sep">|</span>
    <button class="lang-btn" data-lang="he" onclick="setLang('he')">עברית</button>
</div>

<div class="offer-bar" id="offerBar">🚚 اطلبي بـ 500₪ واحصلي على توصيل مجاني للضفة الغربية | القدس 10₪ | الداخل 30₪</div>

<header class="header">
    <div class="header-right">
        <button class="hamburger-btn" onclick="toggleNavDrawer()">
            <span></span><span></span><span></span>
        </button>
        <div class="h-btn"><i class="fa-solid fa-magnifying-glass"></i><span id="searchText">بحث</span></div>
    </div>
    <a href="/" class="header-logo"><img src="pic/logo .jpeg" alt="DEMOISELLE"></a>
    <div class="header-left">
        <div class="h-btn" style="position:relative">
            <i class="fa-regular fa-heart"></i>
            <span id="wishlistText">المفضلة</span>
            <span class="cart-badge" id="wishlistBadge">4</span>
        </div>
        <div class="h-btn"><i class="fa-solid fa-user"></i><span id="accountText">حسابي</span></div>
        <div class="h-btn" style="position:relative"><i class="fa-solid fa-cart-shopping"></i><span class="cart-badge" id="cartBadge">0</span></div>
    </div>
</header>

<!-- Nav Drawer -->
<div class="nav-drawer-overlay" id="navDrawerOverlay" onclick="toggleNavDrawer()"></div>
<div class="nav-drawer" id="navDrawer">
    <div class="nav-drawer-header">
        <a href="/" class="nav-drawer-logo"><img src="pic/logo .jpeg" alt="DEMOISELLE"></a>
        <button class="nav-drawer-close" onclick="toggleNavDrawer()">✕</button>
    </div>
    <div class="nav-drawer-links" id="navLinks">
        <a href="#" data-ar="بدلات" data-en="Suits" data-he="חליפות">بدلات</a>
        <a href="#" data-ar="فساتين" data-en="Dresses" data-he="שמלות">فساتين</a>
        <a href="#" data-ar="طقم قطعتين" data-en="Two-Piece Sets" data-he="סט דו-חלקי">طقم قطعتين</a>
        <a href="#" data-ar="جاكيت" data-en="Jackets" data-he="ז'קטים">جاكيت</a>
        <a href="#" data-ar="جينז" data-en="Jeans" data-he="ג'ינס">جينز</a>
        <a href="#" data-ar="تنانير" data-en="Skirts" data-he="חצאיות">تنانير</a>
        <a href="#" data-ar="بليزر" data-en="Blazers" data-he="בלייזרים">بليزر</a>
        <a href="#" data-ar="عبايات" data-en="Abayas" data-he="עבאיות">عبايات</a>
    </div>
</div>

<div class="wishlist-top">
    <div class="wishlist-top-header">
        <h1 class="wishlist-title" id="pageTitle">قائمة المفضلة</h1>
    </div>

    <div class="top-actions">
        <div class="filter-sort">
            <span id="filterLabel">تصفية حسب:</span>
            <select id="filterSelect" onchange="applyFilters()">
                <option value="all" data-ar="الكل" data-en="All" data-he="הכל">الكل</option>
                <option value="abaya" data-ar="عبايات" data-en="Abayas" data-he="עבאיות">عبايات</option>
                <option value="dress" data-ar="فساتين" data-en="Dresses" data-he="שמלות">فساتين</option>
                <option value="set" data-ar="طقم قطعتين" data-en="Two-Piece Sets" data-he="סט דו-חלקי">طقم قطعتين</option>
                <option value="jacket" data-ar="جاكيت / بليزر" data-en="Jacket / Blazer" data-he="ז'קט / בלייזר">جاكيت / بليزر</option>
            </select>

            <span id="sortLabel">ترتيب حسب:</span>
            <select id="sortSelect" onchange="applyFilters()">
                <option value="recent" data-ar="الأحدث" data-en="Newest" data-he="החדש ביותר">الأحدث</option>
                <option value="price-low" data-ar="السعر: من الأقل" data-en="Price: Low to High" data-he="מחיר: נמוך לגבוה">السعر: من الأقل</option>
                <option value="price-high" data-ar="السعر: من الأعلى" data-en="Price: High to Low" data-he="מחיר: גבוה לנמוך">السعر: من الأعلى</option>
            </select>
        </div>

        <div class="social-icons">
            <a href="https://instagram.com/demoiselle" target="_blank" title="Instagram"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://facebook.com/demoiselle" target="_blank" title="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="mailto:info@demoiselle.ps" title="البريد الإلكتروني"><i class="fa-solid fa-envelope"></i></a>
            <a href="https://snapchat.com/add/demoiselle" target="_blank" title="Snapchat"><i class="fa-brands fa-snapchat"></i></a>
            <a href="https://wa.me/970599123456" target="_blank" title="WhatsApp"><i class="fa-brands fa-whatsapp"></i></a>
            <a href="https://x.com/demoiselle" target="_blank" title="X"><i class="fa-brands fa-x-twitter"></i></a>
        </div>
    </div>
</div>

<div class="toolbar">
    <span class="product-count" id="wishlistCount">عرض 4 منتجات</span>
    <button onclick="clearWishlist()" style="background:var(--red);color:white;padding:10px 20px;border:none;border-radius:5px;cursor:pointer;" id="clearBtn">مسح قائمة المفضلة</button>
</div>

<main class="products-main">
    <div class="products-grid" id="wishlistGrid"></div>
</main>

<script>
    const products = [
        { id:1, category:"abaya", name_ar:"عباية كريب فاخرة", name_en:"Luxury Crepe Abaya", name_he:"עבאיה קרפ יוקרתית", price:349, old:449, colors:["Black","Beige"] },
        { id:2, category:"dress", name_ar:"فستان سهرة أسود أنيق", name_en:"Elegant Black Evening Dress", name_he:"שמלת ערב שחורה אלגנטית", price:599, old:749, colors:["Black","Red"] },
        { id:3, category:"set", name_ar:"طقم قطعتين بيج", name_en:"Beige Two-Piece Set", name_he:"סט דו-חלקי בז'", price:429, old:529, colors:["Beige","Camel"] },
        { id:4, category:"jacket", name_ar:"جاكيت جلد فاخر", name_en:"Luxury Leather Jacket", name_he:"ז'קט עור יוקרתי", price:899, old:1099, colors:["Black"] }
    ];

    let currentLang = localStorage.getItem('demoiseIle_lang') || 'ar';
    let wishlist = JSON.parse(localStorage.getItem('demoiseIle_wishlist') || '[]');
    let cart = JSON.parse(localStorage.getItem('demoiseIle_cart') || '[]');

    if (wishlist.length === 0) {
        wishlist = [1, 2, 3, 4];
        localStorage.setItem('demoiseIle_wishlist', JSON.stringify(wishlist));
    }

    function setLang(lang) {
        currentLang = lang;
        localStorage.setItem('demoiseIle_lang', lang);
        if (lang === 'he' || lang === 'ar') document.documentElement.dir = 'rtl';
        else document.documentElement.dir = 'ltr';
        updateAllTexts();
        renderWishlist();
    }

    function updateAllTexts() {
        const t = {
            ar: {searchText: "بحث", wishlistText: "المفضلة", accountText: "حسابي", pageTitle: "قائمة المفضلة", filterLabel: "تصفية حسب:", sortLabel: "ترتيب حسب:", clearBtn: "مسح قائمة المفضلة"},
            en: {searchText: "Search", wishlistText: "Wishlist", accountText: "Account", pageTitle: "Wishlist", filterLabel: "Filter by:", sortLabel: "Sort by:", clearBtn: "Clear Wishlist"},
            he: {searchText: "חיפוש", wishlistText: "רשימת מועדפים", accountText: "חשבון", pageTitle: "רשימת מועדפים", filterLabel: "סנן לפי:", sortLabel: "מיין לפי:", clearBtn: "נקה רשימת מועדפים"}
        }[currentLang] || {};

        document.getElementById('searchText').textContent = t.searchText || "بحث";
        document.getElementById('wishlistText').textContent = t.wishlistText || "المفضلة";
        document.getElementById('accountText').textContent = t.accountText || "حسابي";
        document.getElementById('pageTitle').textContent = t.pageTitle || "قائمة المفضلة";
        document.getElementById('filterLabel').textContent = t.filterLabel || "تصفية حسب:";
        document.getElementById('sortLabel').textContent = t.sortLabel || "ترتيب حسب:";
        document.getElementById('clearBtn').textContent = t.clearBtn || "مسح قائمة المفضلة";

        document.querySelectorAll('select option').forEach(opt => {
            const translated = opt.getAttribute(`data-${currentLang}`);
            if (translated) opt.textContent = translated;
        });

        document.querySelectorAll('#navLinks a').forEach(a => {
            const translated = a.getAttribute(`data-${currentLang}`);
            if (translated) a.textContent = translated;
        });
    }

    function updateWishlistBadge() {
        document.getElementById('wishlistBadge').textContent = wishlist.length;
    }

    function toggleNavDrawer() {
        document.getElementById('navDrawer').classList.toggle('open');
        document.getElementById('navDrawerOverlay').classList.toggle('open');
    }

    function colorCode(c) {
        const m = {Black:"#1a1a1a", Beige:"#d2b48c", Red:"#ca192c", Camel:"#c19a6b"};
        return m[c] || "#ccc";
    }

    function getProductName(p) {
        if (currentLang === 'en') return p.name_en || p.name_ar;
        if (currentLang === 'he') return p.name_he || p.name_ar;
        return p.name_ar;
    }

    function renderWishlist(filteredProducts = null) {
        const grid = document.getElementById('wishlistGrid');
        const countEl = document.getElementById('wishlistCount');

        const toRender = filteredProducts || wishlist.map(id => products.find(p => p.id === id)).filter(Boolean);

        const countText = currentLang === 'en' ? `Showing ${toRender.length} products` :
            currentLang === 'he' ? `מציג ${toRender.length} מוצרים` : `عرض ${toRender.length} منتج`;

        countEl.textContent = countText;
        updateWishlistBadge();

        if (toRender.length === 0) {
            grid.innerHTML = `<div class="empty-state"><div class="icon">❤️</div><p>${currentLang === 'en' ? 'Wishlist is empty' : currentLang === 'he' ? 'רשימת המועדפים ריקה' : 'قائمة المفضلة فارغة حالياً'}</p></div>`;
            return;
        }

        grid.innerHTML = toRender.map(p => {
            const name = getProductName(p);
            return `
            <div class="product-card" data-id="${p.id}">
                <div class="product-img-wrap">
                    <img class="carousel-slide active" src="https://picsum.photos/id/${100 + p.id}/800/1067" alt="${name}">
                    <!-- اللوجو أكبر وبدون إطار -->
                    <div class="logo-badge">
                        <img src="pic/logo2.png" alt="DEMOISELLE">
                    </div>
                    <button class="wishlist-btn active" onclick="toggleWishlist(this,${p.id});event.stopPropagation()">
                        <i class="fa-solid fa-heart"></i>
                    </button>
                </div>
                <div class="swatches-row">
                    ${p.colors.map(c => `<div class="swatch-circle" style="background:${colorCode(c)}"></div>`).join('')}
                </div>
                <div class="product-info">
                    <div class="product-name">${name}</div>
                    <div class="price-sale">${p.price} ₪</div>
                    ${p.old ? `<div class="price-old">${p.old} ₪</div>` : ''}
                </div>
                <div class="product-options">
                    <div class="option-row">
                        <select>${p.colors.map(c => `<option>${c}</option>`).join('')}</select>
                        <select><option>S</option><option>M</option><option>L</option></select>
                    </div>
                    <button class="add-to-cart-btn" onclick="addToCart(${p.id}); event.stopPropagation()">
                        ${currentLang === 'en' ? 'Add to Cart' : currentLang === 'he' ? 'הוסף לסל' : 'أضف إلى السلة'}
                    </button>
                </div>
            </div>`;
        }).join('');
    }

    function toggleWishlist(btn, id) {
        wishlist = wishlist.filter(item => item !== id);
        localStorage.setItem('demoiseIle_wishlist', JSON.stringify(wishlist));
        renderWishlist();
    }

    function addToCart(id) {
        if (!cart.includes(id)) {
            cart.push(id);
            localStorage.setItem('demoiseIle_cart', JSON.stringify(cart));
            document.getElementById('cartBadge').textContent = cart.length;
        }
        const msg = currentLang === 'en' ? 'Added to cart successfully!' : currentLang === 'he' ? 'המוצר נוסף לסל בהצלחה!' : 'تم إضافة المنتج إلى السلة بنجاح!';
        alert(msg);
    }

    function clearWishlist() {
        const msg = currentLang === 'en' ? 'Are you sure?' : currentLang === 'he' ? 'האם אתה בטוח?' : 'هل أنت متأكد من مسح قائمة المفضلة؟';
        if (confirm(msg)) {
            wishlist = [];
            localStorage.setItem('demoiseIle_wishlist', '[]');
            renderWishlist();
        }
    }

    function applyFilters() {
        const filter = document.getElementById('filterSelect').value;
        const sort = document.getElementById('sortSelect').value;
        let filtered = wishlist.map(id => products.find(p => p.id === id)).filter(Boolean);

        if (filter !== 'all') filtered = filtered.filter(p => p.category === filter);
        if (sort === 'price-low') filtered.sort((a,b) => a.price - b.price);
        if (sort === 'price-high') filtered.sort((a,b) => b.price - a.price);

        renderWishlist(filtered);
    }

    window.onload = () => {
        document.getElementById('cartBadge').textContent = cart.length;
        updateAllTexts();
        renderWishlist();
    };
</script>
</body>
</html>
